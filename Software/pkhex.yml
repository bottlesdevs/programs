Name: pkhex
Description: A Pokémon core series save editor.
Grade: Silver
Arch: win64

Dependencies:
- courie32
- arial32

Executable:
  name: PKHeX
  icon: pkhex.ico
  file: PKHeX.exe
  path: Program Files/PKHeX/PKHeX.exe
  arguments: ""

Steps:
- action: install_exe
  file_name: windowsdesktop-runtime-10.0.5-win-x64.exe
  url: https://builds.dotnet.microsoft.com/dotnet/WindowsDesktop/10.0.5/windowsdesktop-runtime-10.0.5-win-x64.exe
  file_checksum: false
  arguments: /install /quiet /norestart
- action: run_script
  script: |
    mkdir -p drive_c/Program\ Files/PKHeX
- action: install_exe
  file_name: PKHeX.exe
  url: local
  file_checksum: false
  arguments: ""
- action: run_script
  script: |
    PKHEX_SRC=$(find ~ -maxdepth 5 -name "PKHeX.exe" -not -path "*/bottles/*" -not -path "*/.net/*" -type f 2>/dev/null | head -1)
    if [ -n "$PKHEX_SRC" ]; then
        cp "$PKHEX_SRC" drive_c/Program\ Files/PKHeX/
    fi
- action: run_script
  script: |
    wine reg add "HKCU\Software\Microsoft\Windows NT\CurrentVersion\AppCompatFlags\Layers" /v "C:\Program Files\PKHeX\PKHeX.exe" /t REG_SZ /d "~ DPIUNAWARE" /f

Name: gog
Description: The official GOG Galaxy launcher.
Grade: Silver
Arch: win64

Dependencies:
- vcredist2022
- allfonts

Parameters:
  dxvk: true
  vkd3d: true
  sync: fsync
  discrete_gpu: true
  
Executable:
  name: GOG Galaxy
  icon: gog.svg
  file: GalaxyClient.exe
  path: Program Files (x86)/GOG Galaxy/GalaxyClient.exe
  arguments: --in-process-gpu /runWithoutUpdating /deelevated
  
Steps:
- action: install_exe
  file_name: setup_galaxy_2.0.96.26.exe
  url: https://content-system.gog.com/open_link/download?path=/open/galaxy/client/setup_galaxy_2.0.96.26.exe
  file_checksum: 141bf9ece2020ca07f55d288c6a8328f
  arguments: /s
